<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Valentine's Surprise 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevents accidental text selection on taps */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            touch-action: manipulation; /* improve touch response */
        }

        /* main card container */
        .valentine-card {
            background: rgba(255, 248, 245, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 72px 48px 72px 48px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2), 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            padding: 2rem 1.5rem 2.2rem;
            text-align: center;
            transition: all 0.3s ease;
            z-index: 15;
            margin: 20px auto;
            border: 2px solid rgba(255, 105, 180, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            color: #d43f6b;
            margin-bottom: 0.75rem;
            letter-spacing: -0.5px;
            font-weight: 700;
            word-break: keep-all;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 600;
            color: #b23c5c;
            background: #fff0f3;
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 60px;
            margin: 0.8rem 0;
            box-shadow: inset 0 1px 3px #ffcddc, 0 6px 12px rgba(0,0,0,0.05);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 2rem 0 1rem;
            position: relative;
            min-height: 90px;
        }

        .btn {
            font-size: 1.8rem;
            font-weight: bold;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s;
            background: white;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.1);
            font-family: inherit;
            touch-action: manipulation;
        }

        .btn-yes {
            background: #ff6b8b;
            color: white;
            box-shadow: 0 8px 0 #a12a48;
        }

        .btn-yes:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #a12a48;
        }

        .btn-no {
            background: #cdd1d9;
            color: #2c3e4e;
            box-shadow: 0 8px 0 #8e949e;
            position: relative;
        }

        /* response message area */
        .message-area {
            margin-top: 25px;
            padding: 1rem;
            background: #fff1f3;
            border-radius: 48px;
            transition: all 0.3s;
            font-size: 1.3rem;
            font-weight: 500;
            color: #ba2c50;
            border-left: 8px solid #ff85a1;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .hotel-highlight {
            font-weight: bold;
            background: #ffe0e7;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 8px;
            font-size: 1.2rem;
        }

        /* heart balloon container */
        .balloon-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25;
            overflow: hidden;
        }

        .heart-balloon {
            position: absolute;
            font-size: 2.8rem;
            user-select: none;
            pointer-events: none;
            animation: floatAround 18s infinite ease-in-out;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
            opacity: 0.85;
            will-change: transform;
        }

        /* different float paths using random transforms */
        @keyframes floatAround {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(30px, -35px) rotate(6deg);
            }
            50% {
                transform: translate(-20px, -70px) rotate(-4deg);
            }
            75% {
                transform: translate(25px, -40px) rotate(3deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        /* different balloon variations with different durations & delays */
        .balloon-1 { animation-duration: 14s; animation-delay: 0s; left: 5%; top: 70%; }
        .balloon-2 { animation-duration: 19s; animation-delay: 1s; left: 85%; top: 20%; font-size: 3rem; }
        .balloon-3 { animation-duration: 22s; animation-delay: 2.5s; left: 15%; top: 50%; font-size: 2.2rem; }
        .balloon-4 { animation-duration: 17s; animation-delay: 0.8s; left: 70%; top: 80%; font-size: 3.2rem; }
        .balloon-5 { animation-duration: 25s; animation-delay: 3s; left: 45%; top: 10%; font-size: 2.5rem; }
        .balloon-6 { animation-duration: 20s; animation-delay: 4s; left: 25%; top: 85%; }
        .balloon-7 { animation-duration: 16s; animation-delay: 0.3s; left: 60%; top: 40%; font-size: 2.9rem; }
        .balloon-8 { animation-duration: 24s; animation-delay: 2s; left: 92%; top: 60%; font-size: 2rem; }
        .balloon-9 { animation-duration: 18s; animation-delay: 5s; left: 8%; top: 15%; font-size: 2.7rem; }
        .balloon-10 { animation-duration: 21s; animation-delay: 1.7s; left: 50%; top: 88%; font-size: 3rem; }
        .balloon-11 { animation-duration: 15s; animation-delay: 3.5s; left: 78%; top: 30%; }
        .balloon-12 { animation-duration: 23s; animation-delay: 0.1s; left: 35%; top: 95%; font-size: 2.4rem; }

        /* responsive adjustments */
        @media (max-width: 600px) {
            .valentine-card {
                padding: 1.5rem 1rem;
                width: 92%;
            }
            h1 {
                font-size: 1.9rem;
            }
            .question-text {
                font-size: 1.4rem;
            }
            .btn {
                font-size: 1.4rem;
                padding: 0.6rem 1.5rem;
            }
            .message-area {
                font-size: 1.1rem;
            }
            .heart-balloon {
                font-size: 2rem;
            }
            .balloon-2, .balloon-4, .balloon-10 { font-size: 2.4rem; }
        }

        /* extra spark */
        footer {
            font-size: 0.7rem;
            margin-top: 20px;
            color: #e68eaa;
        }

        button:focus-visible {
            outline: 2px solid #ff3366;
        }
    </style>
</head>
<body>

    <!-- Floating heart balloons (moving around) -->
    <div class="balloon-container" id="balloonContainer">
        <!-- 12 heart-shaped balloons to fill the screen with gentle floating motion -->
        <div class="heart-balloon balloon-1">❤️🎈</div>
        <div class="heart-balloon balloon-2">💖🎈</div>
        <div class="heart-balloon balloon-3">💗🎈</div>
        <div class="heart-balloon balloon-4">💓🎈</div>
        <div class="heart-balloon balloon-5">💘🎈</div>
        <div class="heart-balloon balloon-6">💝🎈</div>
        <div class="heart-balloon balloon-7">❤️‍🔥🎈</div>
        <div class="heart-balloon balloon-8">💞🎈</div>
        <div class="heart-balloon balloon-9">💕🎈</div>
        <div class="heart-balloon balloon-10">❤️🎈</div>
        <div class="heart-balloon balloon-11">💖🎈</div>
        <div class="heart-balloon balloon-12">💗🎈</div>
    </div>

    <div class="valentine-card">
        <h1>✨ Happy Valentine's ✨</h1>
        <div class="question-text">
            💌 Will you be my Valentine? 💌
        </div>

        <div class="buttons" id="buttonArea">
            <button class="btn btn-yes" id="yesBtn">YES 💕</button>
            <button class="btn btn-no" id="noBtn">NO 😢</button>
        </div>

        <!-- hidden message area for the final response -->
        <div id="responseMessage" class="message-area hidden"></div>
        <footer>❤️ hearts floating with love ❤️</footer>
    </div>

    <script>
        (function() {
            // DOM elements
            const yesButton = document.getElementById('yesBtn');
            const noButton = document.getElementById('noBtn');
            const responseDiv = document.getElementById('responseMessage');
            const questionTextDiv = document.querySelector('.question-text');
            const buttonsContainer = document.getElementById('buttonArea');

            // ----- yes button logic: show the beautiful message with hotel & time -----
            function onYesClick() {
                // prepare the sweet message
                const hotelName = "Le Rêve Amour Hotel";   // fancy valentine hotel
                const meetingTime = "7:30 PM";
                const finalMessage = `
                    💖 I knew you would say YES! 💖<br>
                    🌹 You've made my heart flutter! 🌹<br><br>
                    Let's meet today at<br>
                    <span class="hotel-highlight">✨ ${hotelName} ✨</span><br>
                    🕰️ <strong>${meetingTime}</strong> in the lobby lounge.<br>
                    Can't wait to see you, my Valentine! 💋
                `;
                
                // Hide the original yes/no buttons and question text (optional)
                yesButton.style.display = 'none';
                noButton.style.display = 'none';
                // also hide the original question text for cleaner look
                if(questionTextDiv) questionTextDiv.style.display = 'none';
                // change heading maybe
                const mainHeading = document.querySelector('h1');
                if(mainHeading) mainHeading.innerHTML = '🎀 Yay! You said YES! 🎀';
                
                // show the beautiful message in the message area
                responseDiv.innerHTML = finalMessage;
                responseDiv.classList.remove('hidden');
                
                // also add extra floating confetti style effect using a little emoji rain?
                createConfettiHearts();
                
                // disable any further movement on no button (just to be safe)
                noButton.style.pointerEvents = 'none';
                yesButton.style.pointerEvents = 'none';
            }

            // ---- evasive NO button: moves away when hover or touch (mobile friendly) ----
            // we'll use both mouse events and touchmove/touchstart detection to avoid cursor/tap.
            // For simplicity, we attach event handlers to move the button to random positions inside the buttons container.
            // But to keep it inside visible area, we use relative/absolute positioning within .buttons container.
            // The "no" button will have position relative/absolute on movement.
            let moveAttempts = 0;
            let isNoMoving = false;
            
            // Store original styles and container measurements to relocate
            function getRandomPositionWithinContainer(btnElement, container) {
                if (!container || !btnElement) return { top: 0, left: 0 };
                const containerRect = container.getBoundingClientRect();
                const btnRect = btnElement.getBoundingClientRect();
                // get relative to container
                const maxLeft = containerRect.width - btnRect.width;
                const maxTop = containerRect.height - btnRect.height;
                // random positions but ensure not too close to edges
                let randLeft = Math.random() * maxLeft;
                let randTop = Math.random() * maxTop;
                // clamp min 0
                randLeft = Math.max(0, Math.min(maxLeft, randLeft));
                randTop = Math.max(0, Math.min(maxTop, randTop));
                return { left: randLeft, top: randTop };
            }
            
            let noBtnPositioned = false;
            let originalNoPosition = null;
            
            // function to move the no button to new spot
            function moveNoButton() {
                if (!noButton) return;
                // ensure that button is still visible and not hidden
                if (noButton.style.display === 'none') return;
                
                const container = buttonsContainer;
                if (!container) return;
                
                // make sure button is absolutely positioned inside relative container
                if (!noBtnPositioned) {
                    // store original inline or computed styles if needed
                    const computed = window.getComputedStyle(noButton);
                    originalNoPosition = {
                        position: computed.position,
                        top: computed.top,
                        left: computed.left,
                        margin: computed.margin,
                        transform: computed.transform
                    };
                    // set container to relative if not already
                    if (window.getComputedStyle(container).position !== 'relative') {
                        container.style.position = 'relative';
                    }
                    noButton.style.position = 'absolute';
                    noButton.style.margin = '0';
                    noBtnPositioned = true;
                }
                
                // get new random spot within container
                const { left, top } = getRandomPositionWithinContainer(noButton, container);
                noButton.style.left = `${left}px`;
                noButton.style.top = `${top}px`;
                noButton.style.transition = 'left 0.2s ease, top 0.2s ease';
                
                // optional small playful scale animation
                noButton.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    if(noButton) noButton.style.transform = '';
                }, 150);
                
                // increment counter to maybe add funny text after several tries
                moveAttempts++;
                if(moveAttempts === 3 || moveAttempts === 6) {
                    // tiny playful message but doesn't break UX
                    const tempHint = document.createElement('div');
                    tempHint.textContent = moveAttempts === 3 ? "😏 No means maybe?" : "💖 Just say YES!";
                    tempHint.style.position = 'absolute';
                    tempHint.style.bottom = '-40px';
                    tempHint.style.left = '0';
                    tempHint.style.right = '0';
                    tempHint.style.fontSize = '0.8rem';
                    tempHint.style.color = '#c94f6e';
                    tempHint.style.background = '#fff0e0';
                    tempHint.style.borderRadius = '40px';
                    tempHint.style.padding = '4px 8px';
                    tempHint.style.width = 'max-content';
                    tempHint.style.margin = '0 auto';
                    tempHint.style.pointerEvents = 'none';
                    tempHint.style.zIndex = '30';
                    if(buttonsContainer && !document.querySelector('.hint-message-temp')) {
                        tempHint.classList.add('hint-message-temp');
                        buttonsContainer.appendChild(tempHint);
                        setTimeout(() => tempHint.remove(), 1200);
                    }
                }
            }
            
            // attach events: mouseenter, touchstart, and also click but we still want click to try moving
            // For better mobile: whenever user taps/fingers on No button, it moves away before click registers?
            // We'll use 'touchstart' and 'mousedown' to evade before the actual click event.
            // Also make sure that after moving, the click won't accidentally trigger? but we can prevent click if movement happened.
            let moveOnEvent = false;
            let moveTimeout = null;
            
            function handleEvade(ev) {
                // If Yes has been clicked already, no need to evade
                if (yesButton.style.display === 'none') return;
                ev.preventDefault();   // prevent default to avoid accidental click after moving?
                // but we don't want to fully prevent click? we'll handle with a flag to allow only moving.
                moveNoButton();
                // Also add a micro delay to prevent the actual click after moving: sometimes on mobile the 'click' still fires
                // we can set a flag to ignore the next click if moved recently.
                if (moveTimeout) clearTimeout(moveTimeout);
                // after moving, temporarily disable noButton click for 150ms to avoid accidental "no" selection
                const originalClickHandler = noButton.onclick;
                const originalListener = noButton.click;
                noButton.style.pointerEvents = 'none';
                moveTimeout = setTimeout(() => {
                    if(noButton) noButton.style.pointerEvents = 'auto';
                }, 200);
            }
            
            // add both mouse and touch events
            noButton.addEventListener('mouseenter', handleEvade);
            noButton.addEventListener('touchstart', handleEvade, { passive: false });
            // also on click we want to move again just in case they manage to click, but we also prevent any no outcome
            noButton.addEventListener('click', (e) => {
                // if yes was already triggered, ignore
                if (yesButton.style.display === 'none') return;
                e.preventDefault();
                e.stopPropagation();
                moveNoButton();
                // Also show playful hint "Nice try! But you must say YES 💖"
                const teaseMsg = document.createElement('div');
                teaseMsg.textContent = "😜 Can't escape the love! Click YES instead 😘";
                teaseMsg.style.position = 'fixed';
                teaseMsg.style.bottom = '20px';
                teaseMsg.style.left = '50%';
                teaseMsg.style.transform = 'translateX(-50%)';
                teaseMsg.style.backgroundColor = '#ffdce5';
                teaseMsg.style.padding = '8px 18px';
                teaseMsg.style.borderRadius = '50px';
                teaseMsg.style.fontWeight = 'bold';
                teaseMsg.style.fontSize = '0.9rem';
                teaseMsg.style.color = '#bc2f55';
                teaseMsg.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)';
                teaseMsg.style.zIndex = '999';
                teaseMsg.style.pointerEvents = 'none';
                document.body.appendChild(teaseMsg);
                setTimeout(() => teaseMsg.remove(), 1500);
                return false;
            });
            
            // Also for the container boundaries on window resize, reposition no button if needed to stay inside.
            window.addEventListener('resize', () => {
                if (noBtnPositioned && noButton.style.display !== 'none' && buttonsContainer) {
                    // reposition to avoid being out of container
                    const container = buttonsContainer;
                    const { left, top } = getRandomPositionWithinContainer(noButton, container);
                    noButton.style.left = `${left}px`;
                    noButton.style.top = `${top}px`;
                }
            });
            
            // Ensure that if Yes button is clicked, the no button doesn't cause any conflict
            yesButton.addEventListener('click', onYesClick);
            
            // also ensure that the yes button cannot be tricked, and they can press it normally.
            // add little floating effect to yes on hover / touch
            yesButton.addEventListener('touchstart', (e) => {
                // just a tiny feedback, but no evasion
                yesButton.style.transform = 'scale(0.97)';
                setTimeout(() => { if(yesButton) yesButton.style.transform = ''; }, 100);
            });
            yesButton.addEventListener('mouseenter', () => {
                yesButton.style.transform = 'scale(1.02)';
            });
            yesButton.addEventListener('mouseleave', () => {
                yesButton.style.transform = '';
            });
            
            // generate a few more heart balloons dynamically to keep fun movement
            function addExtraFloatingHearts() {
                const container = document.getElementById('balloonContainer');
                const heartSymbols = ['❤️', '💖', '💗', '💓', '💘', '💝', '💞', '💕', '❤️‍🔥'];
                for(let i=0; i<6; i++) {
                    const newHeart = document.createElement('div');
                    newHeart.classList.add('heart-balloon');
                    const randomHeart = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                    newHeart.innerHTML = `${randomHeart}🎈`;
                    const size = 1.8 + Math.random() * 1.2;
                    newHeart.style.fontSize = `${size}rem`;
                    newHeart.style.left = `${Math.random() * 85 + 5}%`;
                    newHeart.style.top = `${Math.random() * 80 + 5}%`;
                    const duration = 15 + Math.random() * 15;
                    newHeart.style.animationDuration = `${duration}s`;
                    newHeart.style.animationDelay = `${Math.random() * 5}s`;
                    newHeart.classList.add(`dynamic-heart-${i}`);
                    container.appendChild(newHeart);
                }
            }
            addExtraFloatingHearts();
            
            // simple confetti hearts effect on yes click
            function createConfettiHearts() {
                for(let i=0;i<45;i++) {
                    const confHeart = document.createElement('div');
                    confHeart.innerHTML = ['❤️','💖','💗','💘','💝'][Math.floor(Math.random()*5)];
                    confHeart.style.position = 'fixed';
                    confHeart.style.fontSize = `${15+Math.random()*25}px`;
                    confHeart.style.left = `${Math.random() * 100}%`;
                    confHeart.style.top = `-20px`;
                    confHeart.style.pointerEvents = 'none';
                    confHeart.style.zIndex = '9999';
                    confHeart.style.opacity = '0.9';
                    confHeart.style.transition = 'transform 1s ease-out, opacity 1.5s';
                    document.body.appendChild(confHeart);
                    const randomX = (Math.random() - 0.5) * 200;
                    const fallDuration = 1 + Math.random() * 1.5;
                    confHeart.style.transform = `translateX(${randomX}px) translateY(100vh) rotate(${Math.random()*360}deg)`;
                    confHeart.style.transition = `transform ${fallDuration}s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 1.2s`;
                    setTimeout(() => {
                        confHeart.style.opacity = '0';
                        setTimeout(() => confHeart.remove(), 1500);
                    }, 50);
                }
            }
            
            // little initial message to make sure buttons visible and no button starts normal
            // ensure on load that no button is not absolute yet until first hover.
            // Keep initial UI intact.
            
            // optional: ensure no button can't be clicked easily on first load but still functional with movement.
            // also for mobile touch we set viewport metatag ensures proper scaling.
            console.log('💌 Valentine experience ready — heart balloons floating!');
        })();
    </script>
</body>
</html>
